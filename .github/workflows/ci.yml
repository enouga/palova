name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      # Prisma/Redis sont mockés dans les tests (aucune base ni instance réelle
      # requise) ; JWT_SECRET est la seule variable que les suites de routes
      # exigent explicitement (jwt.sign/verify) — valeur factice, sans rapport
      # avec les secrets réels du club-demo/prod.
      JWT_SECRET: ci-test-secret
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run tests
        run: npm test

  frontend:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        # --runInBand : un flake connu et pré-existant (fuite de timer réel entre
        # fichiers de test quand ils partagent un worker jest) fait échouer
        # BookingModal.test.tsx en exécution parallèle (~6 tests). Exécution
        # série = déterministe et vert (vérifié 2x). La cause racine (timer non
        # nettoyé dans un autre fichier) reste à corriger un jour, sans urgence.
        run: npm test -- --runInBand
