# Stack de production Palova — tout sur une seule VM.
# Lancement : docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --build
# Variables secrètes attendues dans .env.prod (cf. .env.prod.example).

# Rotation des logs : borne l'espace disque consommé par les logs de chaque conteneur.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_DB: palova
      POSTGRES_USER: palovauser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U palovauser -d palova"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    logging: *default-logging
    environment:
      DATABASE_URL: postgresql://palovauser:${POSTGRES_PASSWORD}@postgres:5432/palova
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      # Multi-domaines : la 1re entrée est la racine CANONIQUE (emails, fallback).
      FRONTEND_ROOT_DOMAINS: palova.fr,palova.app
      FRONTEND_URL: https://palova.fr
      NODE_ENV: production
      PORT: "3001"
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM: ${SMTP_FROM}
      # Web Push (VAPID) — sans ces variables, le push est inactif (emails seuls).
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY}
      VAPID_SUBJECT: ${VAPID_SUBJECT}
      # Stripe Connect (charges directes sur les comptes connectés des clubs).
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      # Stripe Billing plateforme (abonnements SaaS des clubs, /api/billing/webhooks).
      STRIPE_BILLING_WEBHOOK_SECRET: ${STRIPE_BILLING_WEBHOOK_SECRET}
      # URL publique de l'API — construit les liens absolus DANS les emails (désinscription…).
      API_PUBLIC_URL: ${API_PUBLIC_URL}
      # Support club → Palova (issues GitHub) — sans TOKEN/REPO, mode console (ticket loggé).
      GITHUB_SUPPORT_TOKEN: ${GITHUB_SUPPORT_TOKEN}
      GITHUB_SUPPORT_REPO: ${GITHUB_SUPPORT_REPO}
      SUPPORT_FALLBACK_EMAIL: ${SUPPORT_FALLBACK_EMAIL}
      # Observabilité GlitchTip (capture d'erreurs backend). Absent → inactif.
      GLITCHTIP_DSN: ${GLITCHTIP_DSN}
    volumes:
      # Fichiers uploadés (avatars) — sans volume, perdus à chaque rebuild.
      - backend_uploads:/app/uploads
      # Photos de messagerie privée (jamais servies statiquement).
      - backend_uploads_private:/app/uploads-private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # /health teste réellement Postgres + Redis. node (toujours présent) plutôt que curl/wget.
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        # API partagée sur .fr (auth Bearer → cross-origin OK depuis .app).
        NEXT_PUBLIC_API_URL: https://api.palova.fr
        # Multi-domaines : 1re entrée = racine canonique. Le domaine de cookie est
        # désormais calculé au runtime selon l'hôte visité (plus de COOKIE_DOMAIN).
        NEXT_PUBLIC_ROOT_DOMAINS: palova.fr,palova.app
        # Clé publique Stripe — GELÉE au build (NEXT_PUBLIC_*) → rebuild front obligatoire si elle change.
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        # DSN GlitchTip front — gelé au build (comme la clé Stripe). Rebuild si changé.
        NEXT_PUBLIC_GLITCHTIP_DSN: ${NEXT_PUBLIC_GLITCHTIP_DSN}
        # Google Analytics 4 — ID de mesure (G-XXXX), gelé au build (NEXT_PUBLIC_*).
        # Absent → aucune mesure d'audience, aucune bannière cookie.
        NEXT_PUBLIC_GA_ID: ${NEXT_PUBLIC_GA_ID}
    restart: unless-stopped
    logging: *default-logging
    environment:
      NODE_ENV: production
      SITE_USER: ${SITE_USER}
      SITE_PASS: ${SITE_PASS}
    depends_on:
      backend:
        condition: service_healthy

  caddy:
    image: caddy:2
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
  backend_uploads:
  backend_uploads_private:
